<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Diagonal Builder — Ganita Prakash Grade 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--border:#d8d4cc;
  --text:#1a1814;--text2:#5a5650;--text3:#9a958e;
  --blue:#2c5f9e;--red:#c0392b;--green:#1a7a4a;--orange:#e08020;
  --font:'DM Sans',-apple-system,sans-serif;--mono:'DM Mono',ui-monospace,monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
.page{max-width:880px;margin:0 auto;padding:28px 20px}
.lbl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.title{font-size:22px;font-weight:700;margin-bottom:5px}
.subtitle{font-size:14px;color:var(--text2);margin-bottom:22px;max-width:580px;line-height:1.5}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:22px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:14px}
.sl-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.sl-row label{font-size:13px;font-weight:500;color:var(--text2);min-width:160px}
.sl-row input[type=range]{flex:1;height:5px;cursor:pointer}
.sl-val{font-family:var(--mono);font-size:15px;font-weight:700;min-width:48px;text-align:right}
canvas{display:block;width:100%;border-radius:10px;border:1.5px solid var(--border);background:#fafaf8;margin-bottom:16px}
.result-banner{border-radius:12px;padding:16px 20px;border:2px solid;text-align:center;margin-bottom:14px}
.rb-name{font-size:26px;font-weight:700;margin-bottom:4px}
.rb-rule{font-size:13.5px;font-weight:500;opacity:.8}
.props-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:14px}
.prop-chip{padding:7px 12px;border-radius:8px;font-size:13px;font-weight:600;border:1.5px solid;display:flex;align-items:center;gap:6px}
.prop-chip.yes{background:#f0fdf4;border-color:#86efac;color:#15803d}
.prop-chip.no{background:#f8f8f8;border-color:var(--border);color:var(--text3)}
.prop-chip .picon{font-size:15px}
.insight{background:#fff8f0;border:1.5px solid #f0d8c0;border-radius:10px;padding:13px 18px;font-size:13.5px;color:#6b4400;line-height:1.65}
.insight strong{color:#a05000}
.insight .eq{font-family:var(--mono);font-size:13px;display:block;margin:2px 0}
</style>
</head>
<body>
<div class="page">
  <div class="lbl">Chapter 4 · Quadrilaterals</div>
  <div class="title">Diagonal Builder</div>
  <div class="subtitle">The diagonals determine the quadrilateral. Change their lengths and the crossing angle — and watch which quadrilateral appears. This is the carpenter's problem made interactive.</div>

  <div class="card">
    <div class="sl-row">
      <label>Diagonal 1 length (AC)</label>
      <input type="range" id="d1" min="40" max="200" value="120" style="accent-color:var(--blue)" oninput="render()">
      <span class="sl-val" style="color:var(--blue)" id="d1v">120</span>
    </div>
    <div class="sl-row">
      <label>Diagonal 2 length (BD)</label>
      <input type="range" id="d2" min="40" max="200" value="120" style="accent-color:var(--red)" oninput="render()">
      <span class="sl-val" style="color:var(--red)" id="d2v">120</span>
    </div>
    <div class="sl-row">
      <label>Crossing angle (°)</label>
      <input type="range" id="ang" min="20" max="160" value="90" style="accent-color:var(--orange)" oninput="render()">
      <span class="sl-val" style="color:var(--orange)" id="angv">90°</span>
    </div>
    <div class="sl-row">
      <label>Split point on AC</label>
      <input type="range" id="split" min="10" max="90" value="50" style="accent-color:var(--green)" oninput="render()">
      <span class="sl-val" style="color:var(--green)" id="splitv">50%</span>
    </div>
  </div>

  <canvas id="cvs" height="340"></canvas>

  <div class="result-banner" id="resultBanner">
    <div class="rb-name" id="rbName">—</div>
    <div class="rb-rule" id="rbRule">—</div>
  </div>

  <div class="props-grid" id="propsGrid"></div>

  <div class="insight" id="insight"></div>
</div>

<script>
const QUAD_COLORS={
  'Square':    {bg:'rgba(26,122,74,.1)',  border:'#1a7a4a', text:'#1a7a4a'},
  'Rectangle': {bg:'rgba(44,95,158,.1)', border:'#2c5f9e', text:'#2c5f9e'},
  'Rhombus':   {bg:'rgba(192,57,43,.08)',border:'#c0392b', text:'#c0392b'},
  'Parallelogram':{bg:'rgba(224,128,32,.1)',border:'#e08020', text:'#e08020'},
  'Kite':      {bg:'rgba(109,40,217,.08)',border:'#6d28d9', text:'#6d28d9'},
  'General':   {bg:'var(--surface2)',    border:'var(--border)', text:'var(--text)'},
};

function classify(d1,d2,ang,split){
  const eq = Math.abs(d1-d2)<6;
  const perp = Math.abs(ang-90)<8;
  const bisect = Math.abs(split-50)<5;
  if(eq && perp && bisect) return 'Square';
  if(eq && bisect) return 'Rectangle';
  if(perp && bisect) return 'Rhombus';
  if(bisect) return 'Parallelogram';
  if(perp) return 'Kite';
  return 'General';
}

const RULES={
  'Square':    'Equal diagonals + bisect each other + cross at 90°',
  'Rectangle': 'Equal diagonals + bisect each other (any angle)',
  'Rhombus':   'Unequal diagonals + bisect each other + cross at 90°',
  'Parallelogram':'Unequal diagonals + bisect each other (any angle)',
  'Kite':      'Unequal diagonals + cross at 90° (one bisects the other)',
  'General':   'No special diagonal relationship',
};

const PROPS_LIST=[
  {key:'equal',    label:'Equal diagonals'},
  {key:'bisect',   label:'Diagonals bisect each other'},
  {key:'perp',     label:'Diagonals perpendicular'},
  {key:'allAngles',label:'All angles 90°'},
  {key:'oppEqual', label:'Opposite sides equal'},
  {key:'oppPar',   label:'Opposite sides parallel'},
  {key:'allEqual', label:'All sides equal'},
];
const SHAPE_PROPS={
  'Square':    {equal:1,bisect:1,perp:1,allAngles:1,oppEqual:1,oppPar:1,allEqual:1},
  'Rectangle': {equal:1,bisect:1,perp:0,allAngles:1,oppEqual:1,oppPar:1,allEqual:0},
  'Rhombus':   {equal:0,bisect:1,perp:1,allAngles:0,oppEqual:1,oppPar:1,allEqual:1},
  'Parallelogram':{equal:0,bisect:1,perp:0,allAngles:0,oppEqual:1,oppPar:1,allEqual:0},
  'Kite':      {equal:0,bisect:0,perp:1,allAngles:0,oppEqual:0,oppPar:0,allEqual:0},
  'General':   {equal:0,bisect:0,perp:0,allAngles:0,oppEqual:0,oppPar:0,allEqual:0},
};

function render(){
  const d1=parseInt(document.getElementById('d1').value);
  const d2=parseInt(document.getElementById('d2').value);
  const ang=parseInt(document.getElementById('ang').value);
  const split=parseInt(document.getElementById('split').value)/100;

  document.getElementById('d1v').textContent=d1;
  document.getElementById('d2v').textContent=d2;
  document.getElementById('angv').textContent=ang+'°';
  document.getElementById('splitv').textContent=Math.round(split*100)+'%';

  const shape=classify(d1,d2,ang,split);
  const col=QUAD_COLORS[shape];

  // Banner
  const banner=document.getElementById('resultBanner');
  banner.style.background=col.bg;
  banner.style.borderColor=col.border;
  document.getElementById('rbName').style.color=col.text;
  document.getElementById('rbName').textContent=shape;
  document.getElementById('rbRule').textContent=RULES[shape];

  // Properties chips
  const props=SHAPE_PROPS[shape];
  const grid=document.getElementById('propsGrid');
  grid.innerHTML='';
  PROPS_LIST.forEach(p=>{
    const chip=document.createElement('div');
    chip.className='prop-chip '+(props[p.key]?'yes':'no');
    chip.innerHTML=`<span class="picon">${props[p.key]?'✓':'–'}</span>${p.label}`;
    grid.appendChild(chip);
  });

  // Draw
  drawQuad(d1,d2,ang,split,col.border,shape);

  // Insight
  const ins=document.getElementById('insight');
  const rules=[];
  if(Math.abs(d1-d2)<6) rules.push('equal diagonals');
  else rules.push(`diagonal ratio ${d1}:${d2}`);
  if(Math.abs(ang-90)<8) rules.push('perpendicular diagonals');
  else rules.push(`crossing at ${ang}°`);
  if(Math.abs(split-50)<5) rules.push('diagonals bisect each other');
  else rules.push(`diagonals split ${Math.round(split*100)}% / ${Math.round((1-split)*100)}%`);
  ins.innerHTML=`<strong>Diagonals:</strong> ${rules.join(', ')}. This produces a <strong>${shape}</strong>.
    <span class="eq">Rule: ${RULES[shape]}</span>
    Try making equal diagonals that bisect at 90° to get a square. Make them unequal but still bisecting to get a parallelogram.`;
}

function drawQuad(d1,d2,ang,split,borderColor,shape){
  const cvs=document.getElementById('cvs');
  const PR=window.devicePixelRatio||1;
  const W=cvs.parentElement.clientWidth;
  cvs.width=W*PR; cvs.height=340*PR;
  cvs.style.width=W+'px'; cvs.style.height='340px';
  const ctx=cvs.getContext('2d');
  ctx.scale(PR,PR);
  ctx.fillStyle='#fafaf8'; ctx.fillRect(0,0,W,340);

  const cx=W/2, cy=170;
  const ang_rad=ang*Math.PI/180;

  // Diagonal 1: horizontal, length d1
  // O splits AC: OA = d1*split, OC = d1*(1-split)
  const oa=d1*split, oc=d1*(1-split);
  // Diagonal 2: at angle from horizontal, length d2
  // O is the crossing point, OB = d2*0.5 always for visualization (kite: not bisected on BD)
  // For kite and general: BD is not bisected; we use 50/50 for BD always, split only affects AC
  const ob=d2*0.5, od=d2*0.5;

  const A={x:cx-oa, y:cy};
  const C={x:cx+oc, y:cy};
  const B={x:cx+ob*Math.cos(ang_rad-Math.PI/2), y:cy-ob*Math.sin(ang_rad-Math.PI/2)};
  const D={x:cx-od*Math.cos(ang_rad-Math.PI/2), y:cy+od*Math.sin(ang_rad-Math.PI/2)};

  // Draw diagonals
  ctx.setLineDash([5,4]);
  ctx.strokeStyle='#c0b8a8'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(C.x,C.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(B.x,B.y); ctx.lineTo(D.x,D.y); ctx.stroke();
  ctx.setLineDash([]);

  // Draw quadrilateral
  ctx.beginPath();
  ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y);
  ctx.lineTo(C.x,C.y); ctx.lineTo(D.x,D.y);
  ctx.closePath();
  ctx.fillStyle=borderColor+'18';
  ctx.fill();
  ctx.strokeStyle=borderColor; ctx.lineWidth=2.5; ctx.stroke();

  // Right angle marker at O if perpendicular
  if(Math.abs(ang-90)<8){
    const sq=8;
    ctx.beginPath();
    ctx.moveTo(cx+sq,cy); ctx.lineTo(cx+sq,cy-sq); ctx.lineTo(cx,cy-sq);
    ctx.strokeStyle='#9a958e'; ctx.lineWidth=1.5; ctx.stroke();
  }

  // Labels
  const FONT='bold 13px DM Sans, sans-serif';
  ctx.font=FONT; ctx.fillStyle='var(--text)'; ctx.textAlign='center';
  const labels=[{p:A,l:'A'},{p:B,l:'B'},{p:C,l:'C'},{p:D,l:'D'},{p:{x:cx,y:cy},l:'O'}];
  const offsets=[[-14,-6],[8,-12],[14,-6],[8,16],[8,14]];
  labels.forEach((lb,i)=>{
    ctx.fillStyle=i<4?'#1a1814':'#9a958e';
    ctx.font=i<4?'bold 13px DM Sans,sans-serif':'12px DM Sans,sans-serif';
    ctx.fillText(lb.l, lb.p.x+offsets[i][0], lb.p.y+offsets[i][1]);
  });

  // Diagonal length annotations
  ctx.font='11px DM Mono,monospace'; ctx.fillStyle='#2c5f9e';
  ctx.fillText('d₁='+d1, cx, cy+22);
  ctx.fillStyle='#c0392b';
  ctx.fillText('d₂='+d2, cx+(B.x-cx)*0.7+14, cy+(B.y-cy)*0.7);

  // Tick marks on equal sides / diagonals
  if(Math.abs(d1-d2)<6){
    drawTick(ctx, A.x,A.y,C.x,C.y,'#2c5f9e');
    drawTick(ctx, B.x,B.y,D.x,D.y,'#c0392b');
  }
  // Arc for angle
  ctx.beginPath(); ctx.strokeStyle='#e08020'; ctx.lineWidth=1.5;
  ctx.arc(cx,cy,24, -Math.PI/2, ang_rad-Math.PI/2); ctx.stroke();
  ctx.font='11px DM Mono'; ctx.fillStyle='#e08020';
  const midA=(-Math.PI/2+ang_rad-Math.PI/2)/2;
  ctx.fillText(ang+'°', cx+36*Math.cos(midA), cy+36*Math.sin(midA));
}

function drawTick(ctx,x1,y1,x2,y2,color){
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
  const nx=-dy/len*5, ny=dx/len*5;
  ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2;
  ctx.moveTo(mx-nx-nx*0.5,my-ny-ny*0.5); ctx.lineTo(mx+nx+nx*0.5,my+ny+ny*0.5); ctx.stroke();
}

render();
</script>
</body>
</html>
