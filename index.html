<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Diagonal Builder — Ganita Prakash Grade 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#030810;--navy2:#060f1e;--navy3:#0a1628;--navy4:#101e32;
  --grid:#0d1c30;--line:#142240;--line2:#1e3258;
  --white:#e0eeff;--white2:#c0d4f0;--dim:#6a8ab0;--dimmer:#3a5070;
  --cyan:#30c0f0;--cyan-glow:rgba(48,192,240,.2);
  --orange:#f08830;--orange-glow:rgba(240,136,48,.2);
  --gold:#f8d040;--gold-glow:rgba(248,208,64,.2);
  --violet:#c070f0;--violet-glow:rgba(192,112,240,.2);
  --green:#40e090;--green-glow:rgba(64,224,144,.2);
  --sans:'Syne',system-ui,sans-serif;--mono:'DM Mono',ui-monospace,monospace;
}
html,body{width:100%;height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--navy);color:var(--white);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;position:fixed;inset:0}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px),linear-gradient(rgba(14,28,52,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(14,28,52,.4) 1px,transparent 1px);background-size:100px 100px,100px 100px,20px 20px,20px 20px}
.top{position:relative;z-index:10;border-bottom:1px solid var(--line2);background:var(--navy2);height:46px;flex-shrink:0;display:flex;align-items:center;padding:0 18px;gap:0}
.top-badge{display:flex;align-items:center;gap:7px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);border-right:1px solid var(--line2);padding-right:14px;margin-right:14px;font-family:var(--mono)}
.tb-num{width:18px;height:18px;border-radius:2px;background:rgba(48,192,240,.15);border:1px solid var(--cyan);color:var(--cyan);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.top-title{font-size:17px;font-weight:800;color:var(--white);letter-spacing:-.02em;flex:1}
.shape-banner-top{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--navy3);border:1px solid var(--line2);border-radius:3px;transition:all .25s}
.sbt-emoji{font-size:20px;line-height:1}.sbt-name{font-size:15px;font-weight:800;letter-spacing:-.02em;transition:color .25s}.sbt-rule{font-size:10px;color:var(--dim);font-family:var(--mono);letter-spacing:.03em}
.main{flex:1;display:grid;grid-template-columns:240px 1fr;overflow:hidden;min-height:0;position:relative;z-index:5}
.left{border-right:1px solid var(--line2);display:flex;flex-direction:column;background:var(--navy2);overflow:hidden}
.lp{padding:12px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.lp-lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);font-family:var(--mono);margin-bottom:10px}
.sl-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}.sl-row:last-child{margin-bottom:0}
.sl-icon{width:28px;height:28px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);flex-shrink:0;border:1px solid}
.sl-body{flex:1}.sl-meta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.sl-name{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);font-family:var(--mono)}.sl-val{font-size:14px;font-weight:700;font-family:var(--mono)}
input[type=range]{width:100%;height:2px;-webkit-appearance:none;background:var(--line2);border-radius:1px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:2px;cursor:pointer;border:1px solid;transition:box-shadow .12s}
.prop-list{display:flex;flex-direction:column;gap:5px}
.prop-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border:1px solid var(--line);border-radius:2px;font-size:11px;font-family:var(--mono);transition:all .2s}
.prop-item.yes{border-color:var(--cyan);background:rgba(48,192,240,.06);color:var(--cyan)}.prop-item.no{color:var(--dimmer);background:var(--navy3)}
.pi-icon{font-size:10px;flex-shrink:0;width:12px}
.insight{padding:12px 14px;font-size:10px;color:var(--dim);font-family:var(--mono);line-height:1.7;flex:1;overflow-y:auto;border-top:1px solid var(--line)}
.insight strong{color:var(--gold)}
.right{display:flex;flex-direction:column;overflow:hidden}
.canvas-wrap{flex:1;overflow:hidden;position:relative;cursor:default}
#cvs{display:block;width:100%;height:100%}

/* M */
@media(max-width:768px){html,body{overflow:auto;height:auto}body{position:static;display:flex;flex-direction:column;min-height:100dvh}.top{height:auto;padding:8px 14px;flex-wrap:wrap;gap:6px}.top-title{font-size:15px}.shape-banner-top{padding:6px 10px}.sbt-name{font-size:13px}.main{grid-template-columns:1fr;grid-template-rows:auto 320px;overflow:visible}.left{border-right:none;border-bottom:1px solid var(--line2);max-height:none;overflow:visible}.lp{padding:10px 12px}.sl-row{gap:6px}.prop-list{display:grid;grid-template-columns:1fr 1fr;gap:4px}.prop-item{font-size:10px;padding:4px 6px}.insight{max-height:120px;overflow-y:auto;font-size:10px}.right{min-height:320px}.canvas-wrap{min-height:320px}}@media(max-width:480px){.top-title{font-size:14px}.prop-list{grid-template-columns:1fr}.main{grid-template-rows:auto 260px}.right,.canvas-wrap{min-height:260px}}</style>
</head>
<body>
<div class="top">
  <div class="top-badge"><div class="tb-num">4</div>CH·04 · QUADRILATERALS</div>
  <div class="top-title">Diagonal Builder</div>
  <div class="shape-banner-top" id="shape-banner"><div class="sbt-emoji" id="sb-emoji">⬜</div><div><div class="sbt-name" id="sb-name">Square</div><div class="sbt-rule" id="sb-rule">equal · bisect · 90°</div></div></div>
</div>
<div class="main">
  <div class="left">
    <div class="lp">
      <div class="lp-lbl">Diagonal lengths</div>
      <div class="sl-row"><div class="sl-icon" style="background:rgba(48,192,240,.1);border-color:var(--cyan);color:var(--cyan)">d₁</div><div class="sl-body"><div class="sl-meta"><span class="sl-name">AC length</span><span class="sl-val" style="color:var(--cyan)" id="v-d1">140</span></div><input type="range" id="d1" min="40" max="220" value="140" style="accent-color:var(--cyan)" oninput="render()"></div></div>
      <div class="sl-row"><div class="sl-icon" style="background:rgba(240,136,48,.1);border-color:var(--orange);color:var(--orange)">d₂</div><div class="sl-body"><div class="sl-meta"><span class="sl-name">BD length</span><span class="sl-val" style="color:var(--orange)" id="v-d2">140</span></div><input type="range" id="d2" min="40" max="220" value="140" style="accent-color:var(--orange)" oninput="render()"></div></div>
    </div>
    <div class="lp">
      <div class="lp-lbl">Crossing</div>
      <div class="sl-row"><div class="sl-icon" style="background:rgba(248,208,64,.1);border-color:var(--gold);color:var(--gold)">∠</div><div class="sl-body"><div class="sl-meta"><span class="sl-name">Angle at O</span><span class="sl-val" style="color:var(--gold)" id="v-ang">90°</span></div><input type="range" id="ang" min="20" max="160" value="90" style="accent-color:var(--gold)" oninput="render()"></div></div>
      <div class="sl-row"><div class="sl-icon" style="background:rgba(192,112,240,.1);border-color:var(--violet);color:var(--violet)">÷</div><div class="sl-body"><div class="sl-meta"><span class="sl-name">Split point</span><span class="sl-val" style="color:var(--violet)" id="v-split">50%</span></div><input type="range" id="split" min="10" max="90" value="50" style="accent-color:var(--violet)" oninput="render()"></div></div>
    </div>
    <div class="lp"><div class="lp-lbl">Properties</div><div class="prop-list" id="prop-list"></div></div>
    <div class="insight" id="insight"></div>
  </div>
  <div class="right"><div class="canvas-wrap"><canvas id="cvs"></canvas></div></div>
</div>
<script>
const SHAPES={Square:{emoji:'⬜',color:'#40e090',rule:'equal · bisect · 90°',props:{equal:1,bisect:1,perp:1,allAngles:1,oppEqual:1,allEqual:1}},Rectangle:{emoji:'▭',color:'#30c0f0',rule:'equal · bisect · any angle',props:{equal:1,bisect:1,perp:0,allAngles:1,oppEqual:1,allEqual:0}},Rhombus:{emoji:'◆',color:'#f08830',rule:'unequal · bisect · 90°',props:{equal:0,bisect:1,perp:1,allAngles:0,oppEqual:1,allEqual:1}},Parallelogram:{emoji:'▱',color:'#f8d040',rule:'unequal · bisect · any angle',props:{equal:0,bisect:1,perp:0,allAngles:0,oppEqual:1,allEqual:0}},Kite:{emoji:'🪁',color:'#c070f0',rule:'any length · one bisects · 90°',props:{equal:0,bisect:0,perp:1,allAngles:0,oppEqual:0,allEqual:0}},General:{emoji:'⬡',color:'#4a6a90',rule:'no special relationship',props:{equal:0,bisect:0,perp:0,allAngles:0,oppEqual:0,allEqual:0}}};
const PROP_LABELS={equal:'Equal diagonals',bisect:'Diagonals bisect each other',perp:'Perpendicular crossing (90°)',allAngles:'All angles = 90°',oppEqual:'Opposite sides equal',allEqual:'All four sides equal'};
function classify(d1,d2,ang,split){const eq=Math.abs(d1-d2)<8,perp=Math.abs(ang-90)<8,bis=Math.abs(split-50)<5;if(eq&&perp&&bis)return'Square';if(eq&&bis)return'Rectangle';if(perp&&bis)return'Rhombus';if(bis)return'Parallelogram';if(perp)return'Kite';return'General';}
const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');
const PR=Math.min(window.devicePixelRatio||1,2);
function render(){
  const d1=+document.getElementById('d1').value,d2=+document.getElementById('d2').value,ang=+document.getElementById('ang').value,split=+document.getElementById('split').value/100;
  document.getElementById('v-d1').textContent=d1;document.getElementById('v-d2').textContent=d2;document.getElementById('v-ang').textContent=ang+'°';document.getElementById('v-split').textContent=Math.round(split*100)+'%';
  const shape=classify(d1,d2,ang,split),sh=SHAPES[shape];
  const banner=document.getElementById('shape-banner');banner.style.borderColor=sh.color+'60';banner.style.background=sh.color+'10';
  document.getElementById('sb-emoji').textContent=sh.emoji;const nm=document.getElementById('sb-name');nm.textContent=shape;nm.style.color=sh.color;document.getElementById('sb-rule').textContent=sh.rule;
  const pl=document.getElementById('prop-list');pl.innerHTML='';Object.entries(PROP_LABELS).forEach(([k,lbl])=>{const has=sh.props[k];const item=document.createElement('div');item.className='prop-item '+(has?'yes':'no');item.innerHTML=`<span class="pi-icon">${has?'✓':'—'}</span>${lbl}`;pl.appendChild(item);});
  const parts=[];if(Math.abs(d1-d2)<8)parts.push(`<strong>equal</strong> diagonals (${d1})`);else parts.push(`d₁=${d1}, d₂=${d2}`);if(Math.abs(ang-90)<8)parts.push(`<strong>perpendicular</strong> crossing`);else parts.push(`crossing at ${ang}°`);if(Math.abs(split*100-50)<5)parts.push(`<strong>bisecting</strong>`);else parts.push(`split ${Math.round(split*100)}/${Math.round((1-split)*100)}`);
  document.getElementById('insight').innerHTML=parts.join(' · ')+`<br><br>→ <strong>${shape}</strong><br><br>Snap to <strong>Square</strong>: d₁=d₂, angle=90°, split=50%<br>Snap to <strong>Kite</strong>: angle=90°, split≠50%<br>Snap to <strong>Rhombus</strong>: d₁≠d₂, angle=90°, split=50%`;
  drawQuad(d1,d2,ang,split,sh.color,shape);
}
function drawQuad(d1,d2,ang,split,shapeColor,shape){
  const wrap=cvs.parentElement,W=wrap.clientWidth,H=wrap.clientHeight;cvs.width=W*PR;cvs.height=H*PR;cvs.style.width=W+'px';cvs.style.height=H+'px';ctx.resetTransform();ctx.scale(PR,PR);
  ctx.fillStyle='rgba(3,8,16,.85)';ctx.fillRect(0,0,W,H);
  for(let x=0;x<W;x+=20){ctx.strokeStyle=x%100===0?'rgba(30,50,88,.6)':'rgba(20,34,64,.4)';ctx.lineWidth=x%100===0?.8:.4;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=20){ctx.strokeStyle=y%100===0?'rgba(30,50,88,.6)':'rgba(20,34,64,.4)';ctx.lineWidth=y%100===0?.8:.4;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const cx=W/2,cy=H/2,ar=ang*Math.PI/180,oa=d1*split,oc=d1*(1-split),ob=d2*0.5,od=d2*0.5;
  const A={x:cx-oa,y:cy},C={x:cx+oc,y:cy},B={x:cx+ob*Math.cos(ar-Math.PI/2),y:cy-ob*Math.sin(ar-Math.PI/2)},D={x:cx-od*Math.cos(ar-Math.PI/2),y:cy+od*Math.sin(ar-Math.PI/2)},O={x:cx,y:cy};
  ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.lineTo(C.x,C.y);ctx.lineTo(D.x,D.y);ctx.closePath();ctx.fillStyle=shapeColor+'12';ctx.fill();
  ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(100,150,200,.35)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(C.x,C.y);ctx.stroke();ctx.beginPath();ctx.moveTo(B.x,B.y);ctx.lineTo(D.x,D.y);ctx.stroke();ctx.setLineDash([]);
  ctx.shadowColor=shapeColor;ctx.shadowBlur=16;ctx.strokeStyle=shapeColor;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.lineTo(C.x,C.y);ctx.lineTo(D.x,D.y);ctx.closePath();ctx.stroke();ctx.shadowBlur=0;
  if(Math.abs(ang-90)<8){const sq=9;ctx.strokeStyle='rgba(248,208,64,.6)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(cx+sq,cy);ctx.lineTo(cx+sq,cy-sq);ctx.lineTo(cx,cy-sq);ctx.stroke();}
  function drawTick(p1,p2,col){const mx=(p1.x+p2.x)/2,my=(p1.y+p2.y)/2,dx=p2.x-p1.x,dy=p2.y-p1.y,l=Math.hypot(dx,dy)||1,nx=-dy/l*6,ny=dx/l*6;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(mx-nx,my-ny);ctx.lineTo(mx+nx,my+ny);ctx.stroke();}
  if(Math.abs(d1-d2)<8){drawTick(A,C,'#30c0f0');drawTick(B,D,'#30c0f0');}
  if(Math.abs(split*100-50)<5){const gcol='rgba(100,150,200,.5)';drawTick(A,O,gcol);drawTick(O,C,gcol);drawTick(B,O,gcol);drawTick(O,D,gcol);}
  const vcx=(A.x+B.x+C.x+D.x)/4,vcy=(A.y+B.y+C.y+D.y)/4;
  [['A',A],['B',B],['C',C],['D',D]].forEach(([lbl,p])=>{const dx=p.x-vcx,dy=p.y-vcy,l=Math.hypot(dx,dy)||1,lx=p.x+dx/l*18,ly=p.y+dy/l*18;ctx.shadowColor=shapeColor;ctx.shadowBlur=8;ctx.font='bold 12px DM Mono,monospace';ctx.fillStyle=shapeColor;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lbl,lx,ly);ctx.shadowBlur=0;ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fillStyle=shapeColor;ctx.fill();ctx.beginPath();ctx.arc(p.x,p.y,2.5,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();});
  ctx.font='10px DM Mono,monospace';ctx.fillStyle='rgba(100,150,200,.6)';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('O',cx+8,cy+4);ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fillStyle='rgba(100,150,200,.6)';ctx.fill();
  ctx.font='bold 9px DM Mono,monospace';ctx.fillStyle='#30c0f0';ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText('d₁='+d1,(A.x+C.x)/2,cy+12);ctx.fillStyle='#f08830';ctx.textAlign='left';ctx.fillText('d₂='+d2,(B.x+D.x)/2+12,(B.y+D.y)/2);
  ctx.strokeStyle='rgba(248,208,64,.6)';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(cx,cy,20,-Math.PI/2,ar-Math.PI/2);ctx.stroke();const midA=(-Math.PI/2+ar-Math.PI/2)/2;ctx.font='bold 9px DM Mono,monospace';ctx.fillStyle='#f8d040';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ang+'°',cx+32*Math.cos(midA),cy+32*Math.sin(midA));
}
new ResizeObserver(render).observe(document.getElementById('cvs').parentElement);render();
</script>
</body>
</html>
